x-env-loader: &env-loader
  env_file:
    - .env.config

x-logging: &logging
  logging:
    driver: fluentd
    options:
      fluentd-address: localhost:24224
      fluentd-async: "true"
      tag: "docker.{{.Name}}"
      fluentd-sub-second-precision: "true"

services:
  ros2:
    image: us-docker.pkg.dev/practical-cider-485717-k0/prod-images/ros2:${VERSION:-1.2.3}
    <<: [*env-loader, *logging]
    platform: linux/amd64
    environment:
      - INFLUXDB_URL=http://host.docker.internal:8086
      - INFLUXDB_ORG=anvil
      - INFLUXDB_BUCKET=workcell
      - INFLUXDB_TOKEN=anvil-workcell
      - DEVICE_NAME
      - VERSION=${VERSION:-1.2.3}
    volumes:
      - ./config:/config
      - ./data:/data
      - robot-meshes:/robot-meshes
      - /etc/machine-id:/etc/machine-id:ro
      - /etc/anvil-os-version:/etc/anvil-os-version:ro
      - /etc/anvil-os-builder-commit:/etc/anvil-os-builder-commit:ro
      - .git:/repo-git:ro
      - ./.android:/root/.android
      - /run/cameras:/run/cameras:ro
      # Live USB bus so udev hotplug nodes propagate into the container
      - /dev/bus/usb:/dev/bus/usb:rshared
    tmpfs:
      - /anvil-tmp:size=5G
    privileged: true
    network_mode: host
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    post_start:
      - command: /post_start.sh
    pre_stop:
      - command: /pre_stop.sh
    stop_signal: SIGINT
    stop_grace_period: 45s

  webapps:
    image: us-docker.pkg.dev/practical-cider-485717-k0/prod-images/webapps:${VERSION:-1.2.3}
    <<: [*env-loader, *logging]
    ports:
      - 3000:3000
    environment:
      - VERSION=${VERSION:-1.2.3}
      - NODE_ENV=production
      - DATA_DIR=/data
      - MIGRATIONS_FOLDER=/app/migrations
      - ROS_WS_ENDPOINT=ws://host.docker.internal:9090
      - MESH_DIR=/meshes
    volumes:
      - ./data:/data
      - robot-meshes:/meshes:ro
      - /etc/machine-id:/etc/machine-id:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - workcell-network
    depends_on:
      ros2:
        condition: service_started
    restart: unless-stopped
    post_start:
      - command: /post_start.sh
    pre_stop:
      - command: /pre_stop.sh

  influxdb:
    image: us-docker.pkg.dev/practical-cider-485717-k0/prod-images/influxdb:${VERSION:-1.2.3}
    <<: *logging
    user: "0:0"
    ports:
      - 8086:8086
    volumes:
      - ./data/influxdb3:/var/lib/influxdb3
      - /etc/machine-id:/etc/machine-id:ro
    depends_on:
      fluent-bit:
        condition: service_healthy
    environment:
      - INFLUXDB_PORT=8086
      - INFLUXDB_CLOUD_URL
      - INFLUXDB_CLOUD_BUCKET
      - INFLUXDB_CLOUD_TOKEN
    networks:
      - workcell-network
    restart: unless-stopped
    post_start:
      - command: /post_start.sh
    pre_stop:
      - command: /pre_stop.sh

  telegraf:
    image: us-docker.pkg.dev/practical-cider-485717-k0/prod-images/telegraf:${VERSION:-1.2.3}
    <<: [*env-loader, *logging]
    user: telegraf:444
    privileged: true
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /run/udev:/run/udev:ro
      - /etc/machine-id:/etc/machine-id:ro
      - /etc/anvil-os-version:/etc/anvil-os-version:ro
      - /etc/anvil-os-builder-commit:/etc/anvil-os-builder-commit:ro
      - .git:/repo-git:ro
    environment:
      - HOST_PROC=/host/proc
      - HOST_SYS=/host/sys
      - ROS_WS_ENDPOINT=ws://host.docker.internal:9090
      - INFLUXDB_URL=http://influxdb:8086
      - INFLUXDB_ORG=anvil
      - INFLUXDB_BUCKET=workcell
      - INFLUXDB_TOKEN=anvil-workcell
      - DEVICE_NAME
      - VERSION=${VERSION:-1.2.3}
    extra_hosts:
      - host.docker.internal:host-gateway
    networks:
      - workcell-network
    depends_on:
      fluent-bit:
        condition: service_healthy
      influxdb:
        condition: service_started
    restart: unless-stopped
    post_start:
      - command: /post_start.sh
    pre_stop:
      - command: /pre_stop.sh

  fluent-bit:
    image: us-docker.pkg.dev/practical-cider-485717-k0/prod-images/fluent-bit:${VERSION:-1.2.3}
    <<: *env-loader
    ports:
      - 24224:24224
      - 2020:2020
    volumes:
      - /var/log:/var/log:ro
      - ./data/fluent-bit:/data
      - /etc/machine-id:/etc/machine-id:ro
      - /etc/anvil-os-version:/etc/anvil-os-version:ro
      - /etc/anvil-os-builder-commit:/etc/anvil-os-builder-commit:ro
      - .git:/repo-git:ro
    environment:
      - DEVICE_NAME
      - VERSION=${VERSION:-1.2.3}
      - GRAFANA_LOKI_HOST
      - GRAFANA_LOKI_USER
      - GRAFANA_LOKI_API_KEY
    command: /fluent-bit/bin/fluent-bit -q -c /fluent-bit/etc/fluent-bit-cloud.conf
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - workcell-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:2020/api/v1/health"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 3s
    restart: unless-stopped
    post_start:
      - command: /post_start.sh
    pre_stop:
      - command: /pre_stop.sh

networks:
  workcell-network:
    driver: bridge

volumes:
  robot-meshes:
